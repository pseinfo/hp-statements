<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHS Hazard & Precautionary Statements</title>
    <style>
      :root {
        --primary: #2c3e50;
        --accent: #3498db;
        --bg: #fdfdfd;
        --text: #2c3e50;
        --border: #e1e4e8;
        --muted: #6a737d;
      }

      body {
        margin: 0;
        padding: 40px 20px;
        line-height: 1.5;
        font-family: sans-serif;
        color: var( --text );
        background: var( --bg );
      }

      .container {
        margin: 0 auto;
        max-width: 900px;
      }

      header {
        margin-bottom: 40px;
        padding-bottom: 20px;
        border-bottom: 1px solid var( --border );
      }

      h1 {
        margin: 0;
        font-size: 1.75rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      p.subtitle {
        margin: 0;
        font-size: 1rem;
        color: var( --muted );
      }

      .controls {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        gap: 15px;
        margin-bottom: 30px;
        padding: 10px 0;
        background: var( --bg );
        border-bottom: 1px solid transparent;
      }

      .controls.sticky {
        border-bottom-color: var( --border );
      }

      input, select {
        padding: 8px 12px;
        font-size: 0.9rem;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 6px;
        outline: none;
      }

      input {
        flex: 1;
      }

      select {
        min-width: 80px;
        cursor: pointer;
      }

      input:focus, select:focus {
        border-color: var( --accent );
        box-shadow: 0 0 0 3px rgba( 52 152 219 / 0.1 );
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>GHS Hazard & Precautionary Statements</h1>
        <p class="subtitle">Complete catalog of phrases declared within the <code>@pseinfo/hp-statements</code> library.</p>
      </header>

      <div class="controls" id="navbar">
        <input type="text" id="search" placeholder="Filter by code or text …" oninput="filter()">
        <select id="lang" onchange="updateLang()">{LANGS}</select>
      </div>
    </div>
  </body>
</html>
