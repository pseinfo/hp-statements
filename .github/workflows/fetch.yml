name: Weekly Data Fetch

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  fetch:
    name: Fetch and Update
    runs-on: ubuntu-latest

    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Fetch Latest Data
        run: |
          git config core.ignorecase false
          npm run fetch

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "data: update ghs statements from source"
          committer: chemdroid[bot] <281193672+chemdroid[bot]@users.noreply.github.com>
          author: chemdroid[bot] <281193672+chemdroid[bot]@users.noreply.github.com>
          branch: automation/ghs-updates
          delete-branch: true
          title: "Data Update: Latest GHS Statements"
          body: |
            Automated update of GHS hazard and precautionary statements.

            This PR was automatically generated by the weekly fetch workflow.
            Source: [mhchem/hpstatements](https://github.com/mhchem/hpstatements)
          labels: |
            automation
            data
            chore
